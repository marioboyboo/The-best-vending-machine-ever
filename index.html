<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Vending Machine</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .vending-machine { width: 280px; height: 450px; background: #d32f2f; border: 8px solid #b71c1c; border-radius: 10px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .glass { width: 80%; height: 50%; background: #e3f2fd; margin: 20px auto; border: 4px solid #333; display: flex; align-items: center; justify-content: center; font-size: 50px; position: relative; overflow: hidden; }
        .slot { width: 100px; height: 40px; background: #111; margin: 40px auto 10px; border-radius: 5px; }
        .button-panel { text-align: center; }
        button { background: #ffeb3b; border: none; padding: 15px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:hover { background: #fbc02d; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        #display { color: #0f0; background: #000; padding: 5px 10px; font-family: monospace; border: 2px solid #333; margin-bottom: 20px; width: 200px; text-align: center; }
        .item-text { font-size: 20px; color: #333; text-align: center; padding: 10px; }
    </style>
</head>
